upstream internship_api {
    server bot:8000;
    keepalive 32;
}

upstream flower {
    server flower:5555;
}

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ws:10m  rate=5r/m;

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS in production (comment out for local dev)
    # return 301 https://$host$request_uri;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"            always;
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin"   always;
    add_header Permissions-Policy       "geolocation=()"  always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json text/html text/css application/javascript;
    gzip_min_length 1024;

    # ── Dashboard ─────────────────────────────────────────────────────────────
    location = / {
        proxy_pass http://internship_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass 1;
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://internship_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Health (no rate limit — used by load balancer) ────────────────────────
    location /health {
        proxy_pass http://internship_api/health;
        access_log off;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws/ {
        limit_req zone=ws burst=3;
        proxy_pass http://internship_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;    # 1h — WebSocket stays open
        proxy_send_timeout 3600s;
    }

    # ── Flower (Celery monitoring) — restrict to internal/VPN IPs ─────────────
    location /flower/ {
        # In production: uncomment and set your IP/CIDR
        # allow 10.0.0.0/8;
        # deny all;

        proxy_pass http://flower/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        rewrite ^/flower/(.*)$ /$1 break;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~* \.(env|git|sql|bak|log)$ {
        return 404;
    }
    location = /favicon.ico { return 204; access_log off; }
    location = /robots.txt  { return 200 "User-agent: *\nDisallow: /api/\n"; }
}

