global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    app: internship_bot
    env: production

# ── Alert rules ────────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts.yml

# ── Alertmanager ───────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ── Scrape targets ─────────────────────────────────────────────────────────────
scrape_configs:

  # FastAPI application metrics
  - job_name: internship_bot_api
    static_configs:
      - targets: ["bot:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # Celery / Redis metrics via redis_exporter
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s

  # PostgreSQL metrics via postgres_exporter
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s

  # Node exporter (host CPU/memory/disk) — optional, comment out if not needed
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s
