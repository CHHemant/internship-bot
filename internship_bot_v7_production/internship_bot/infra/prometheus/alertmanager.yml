global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "${SMTP_USER}"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASS}"
  smtp_require_tls: true

# ── Routing tree ───────────────────────────────────────────────────────────────
route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    # Business wins → Telegram immediately (no grouping delay)
    - matchers:
        - alertname =~ "InterviewInviteReceived|OfferReceived"
      receiver: telegram_urgent
      group_wait: 0s
      repeat_interval: 24h

    # Critical system alerts → Telegram + email
    - matchers:
        - severity = critical
      receiver: critical_all
      group_wait: 30s
      repeat_interval: 1h

    # Warnings → email digest
    - matchers:
        - severity = warning
      receiver: email_digest
      group_wait: 5m
      repeat_interval: 6h

    # Info → Telegram only
    - matchers:
        - severity = info
      receiver: telegram_only
      repeat_interval: 12h

receivers:
  - name: default
    email_configs:
      - to: "${NOTIFY_EMAIL_TO}"
        send_resolved: true
        html: |
          {{ range .Alerts }}
          <b>{{ .Annotations.summary }}</b><br/>
          {{ .Annotations.description }}<br/>
          {{ end }}

  - name: telegram_urgent
    webhook_configs:
      - url: "http://bot:8000/internal/alert-webhook"
        send_resolved: false
        http_config:
          bearer_token: "${INTERNAL_WEBHOOK_TOKEN}"

  - name: critical_all
    email_configs:
      - to: "${NOTIFY_EMAIL_TO}"
        send_resolved: true
    webhook_configs:
      - url: "http://bot:8000/internal/alert-webhook"
        send_resolved: true
        http_config:
          bearer_token: "${INTERNAL_WEBHOOK_TOKEN}"

  - name: email_digest
    email_configs:
      - to: "${NOTIFY_EMAIL_TO}"
        send_resolved: false

  - name: telegram_only
    webhook_configs:
      - url: "http://bot:8000/internal/alert-webhook"
        send_resolved: false
        http_config:
          bearer_token: "${INTERNAL_WEBHOOK_TOKEN}"

inhibit_rules:
  # If API is down, suppress all other alerts (they're all downstream)
  - source_matchers: [alertname = "APIDown"]
    target_matchers: [severity =~ "warning|info"]
    equal: ["app"]
